version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: derclinic
    ports:
      - "5432:5432"
    volumes:
      - derclinic_pg:/var/lib/postgresql/data
volumes:
  derclinic_pg:
